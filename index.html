<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New vision</title>
    <style>
        /* Сброс отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Контейнер для секций с привязкой при скролле */
        .sections {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* Каждая секция на весь экран */
        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            padding: 20px;
        }

        /* Контент внутри секции */
        .content {
            max-width: 90%;
        }

        /* Заголовки */
        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        h2 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        /* Описание / подзаголовок */
        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.9;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 1.5rem;
            display: inline-block;
        }

        /* Ссылка на третью страницу */
        .object-link {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 300;
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 0.2rem;
            transition: border-color 0.3s, opacity 0.3s;
        }

        .object-link:hover {
            border-bottom-color: #fff;
            opacity: 0.9;
        }

        /* Анимация появления */
        .section .content {
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Маленькая подсказка для прокрутки */
        .scroll-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            letter-spacing: 1px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="sections">
        <!-- Первая секция (как была) -->
        <section class="section">
            <div class="content">
                <h1>New vision</h1>
                <p class="subtitle">новый взгляд на строительные процессыG</p>
            </div>
            <!-- Подсказка о прокрутке (по желанию) -->
            <div class="scroll-hint">Прокрутите вниз</div>
        </section>

        <!-- Вторая секция с объектом и ссылкой на третью страницу -->
        <section class="section">
            <div class="content">
                <h2>Объекты</h2>
                <a href="third.html" class="object-link">Ильинка 3/8</a>
            </div>
        </section>
    </div>

    <!-- 
        Третья страница (third.html) пока пустая.
        Вы можете создать её позже, просто скопировав структуру 
        и изменив содержимое. 
    -->
</body>
</html>
